<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Delta Install Tool</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 90%;
  max-width: 380px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  text-align: center;
  color: white;
}

/* アイコン */
.logo {
  width: 80px;
  height: 80px;
  border-radius: 20px;
  margin: 0 auto 15px;
  overflow: hidden;
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.btn {
  display: block;
  width: 90%;
  margin: 12px auto;
  padding: 14px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
}

.install { background: #007aff; color: white; }
.download { background: #34c759; color: white; }

.progress {
  width: 90%;
  height: 10px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin: 20px auto;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: #00c6ff;
  transition: width 0.2s;
}

.status {
  font-size: 13px;
  opacity: 0.8;
}

.note {
  font-size: 12px;
  margin-top: 20px;
  opacity: 0.8;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="card">

  <!-- アイコン -->
  <div class="logo">
    <img src="https://www.dropbox.com/scl/fi/0w09mf8weh3womxnt0kcz/2026-04-08-19-48-02.jpg?rlkey=ez0p83dc809q6h8rk6po50a7t&st=wuq8j3ut&raw=1" alt="icon">
  </div>

  <h1>Delta iOS IPA</h1>

  <!-- 重要：直接リンク -->
  <a class="btn install"
     href="itms-services://?action=download-manifest&url=https://Delta-executor9.github.io/Delta/manifest.plist"
     onclick="startInstall()">
     Direct Install
  </a>

  <a class="btn download"
     href="https://github.com/Delta-executor9/Delta/releases/download/v1/Delta.ipa"
     onclick="startDownload()">
     Download IPA
  </a>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="status" id="status">Waiting</div>

  <div class="note">
   Please open it in Safari. <br>
   After installation, please trust it in Settings → General → VPN & Device Management. 
  </div>

</div>

<script>
let progress = 0;
let timer;

function startProgress(text) {
  progress = 0;
  const bar = document.getElementById("bar");
  const status = document.getElementById("status");

  bar.style.width = "0%";
  status.innerText = text;

  clearInterval(timer);

  timer = setInterval(() => {
    if (progress >= 90) return;
    progress += Math.random() * 10;
    bar.style.width = progress + "%";
  }, 200);
}

function startInstall() {
  startProgress("Installing...");
}

function startDownload() {
  startProgress("Downloading...");
}
</script>

</body>
</html>
