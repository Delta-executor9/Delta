<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Delta インストール</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f2f4f7;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: 60px auto;
      background: #fff;
      padding: 30px 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      color: #555;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }

    .install {
      background: #007aff;
      color: white;
    }

    .download {
      background: #34c759;
      color: white;
    }

    .note {
      font-size: 12px;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Delta をインストール</h1>
    <p>Safariでこのページを開き、下のボタンをタップしてください。</p>

    <!-- ダイレクトインストール -->
    <a class="btn install"
       href="itms-services://?action=download-manifest&url=https://kouya77.github.io/Delta/manifest.plist">
      📲 インストール
    </a>

    <!-- ダウンロードボタン -->
    <a class="btn download"
       href="https://github.com/kouya77/Delta/releases/download/1.0/Delta.ipa">
      ⬇️ IPAをダウンロード
    </a>

    <p class="note">
      ※ .ipa は署名済み（Ad-hoc / Enterprise）である必要があります<br>
      ※ インストールはSafariでのみ動作します
    </p>
  </div>

</body>
</html>
